<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life of Marie - 20 Ans</title>
    <style>
        /* --- STYLE GLOBAL --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600;1,700&display=swap');

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #007bff;
            color: #ffffff;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box;
            z-index: 1000; background: rgba(0, 123, 255, 0.98);
            backdrop-filter: blur(10px);
        }
        .logo { font-weight: 900; letter-spacing: 1px; }
        
        .menu-toggle {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 5px; z-index: 2000;
        }
        .menu-toggle span {
            display: block; width: 30px; height: 4px;
            background: white; border-radius: 2px;
            transition: 0.3s;
        }

        /* --- MENU OVERLAY --- */
        .nav-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: #007bff; z-index: 1500;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
        }
        .nav-overlay.active { right: 0; }
        .nav-overlay a {
            color: white; text-decoration: none; font-size: 1.8rem;
            font-weight: 900; margin: 15px 0; text-transform: uppercase;
        }

        /* --- HERO --- */
        .section-hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; position: relative;
        }
        .grid-text-container { text-transform: uppercase; line-height: 0.85; z-index: 10; }
        .row-life { font-size: 22vw; color: white;}
        .row-of { font-size: 16vw; margin-left: 5%; }
        .row-marie { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: 18vw; text-transform: lowercase; margin-top: -2%; }
        .sunglasses { font-size: 18vw; position: absolute; top: 15%; left: 10%; animation: float 4s infinite ease-in-out; }
        .moving-sun { font-size: 15vw; position: absolute; bottom: 15%; right: 10%; animation: float 5s infinite ease-in-out; }

        /* --- SECTIONS GÉNÉRALES --- */
        section { padding: 80px 20px; text-align: center; color: #000; border-top: 1px solid #eee; background: white; }
        section h1 { color: #007bff; font-size: 2.5rem; margin-bottom: 20px; }
        .bg-light { background-color: #f8f9fa; }

        /* --- MARIE-O-SCOPE --- */
        .age-display { font-size: 3.5rem; font-weight: 900; color: #007bff; margin-bottom: 20px; }
        .morph-container {
            width: 280px; height: 350px; margin: 0 auto;
            border: 6px solid #007bff; border-radius: 20px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .morph-container img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        .age-slider { width: 100%; max-width: 300px; margin-top: 20px; accent-color: #007bff; }

        /* --- QUIZ STYLE --- */
        .quiz-container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left; }
        .quiz-question { font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; color: #007bff; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        .quiz-option { 
            padding: 12px 20px; border: 2px solid #eee; border-radius: 10px; 
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .quiz-option:hover { border-color: #007bff; background: #f0f7ff; }
        .quiz-option.correct { background: #2ed573 !important; color: white; border-color: #2ed573; }
        .quiz-option.wrong { background: #ff4757 !important; color: white; border-color: #ff4757; }
        #quiz-result { margin-top: 20px; font-weight: 900; text-align: center; font-size: 1.5rem; display: none; }

        /* --- BOUTONS --- */
        .submit-btn { 
            background: #007bff; color: #fff; padding: 15px; border-radius: 40px; 
            border: none; width: 100%; font-weight: 900; font-size: 1.1rem; 
            text-transform: uppercase; cursor: pointer; margin-top: 10px;
        }

        /* --- MESSAGES --- */
        .message-card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: left; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">MARIE 20 ANS</div>
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <a href="#" onclick="toggleMenu()">Accueil</a>
        <a href="#evolution" onclick="toggleMenu()">LA VIE DE MARIE</a>
        <a href="#quiz" onclick="toggleMenu()">Le Quiz</a>
        <a href="#dossiers" onclick="toggleMenu()"> LE MUR DU LEAK</a>
        <a href="#photobooth" onclick="toggleMenu()">Photobooth</a>
        <a href="#guestbook" onclick="toggleMenu()">Livre d'or</a>
    </nav>

    <section class="section-hero" style="background:#007bff; border:none;">
        <div class="sunglasses">🕶️</div>
        <div class="moving-sun">☀️</div>
        <div class="grid-text-container">
            <div class="row-life">LIFE</div>
            <div class="row-of" style="color:white;">OF</div>
            <div class="row-marie" style="color:white;">marie</div>
        </div>
    </section>

    <section id="evolution">
        <h1>LA VIE DE MARIE</h1>
        <div class="age-display"><span id="current-age">10</span> ANS</div>
        <div class="morph-container">
            <img id="marie-photo" src="https://via.placeholder.com/600x800?text=Photo+10+ans" alt="Marie">
        </div>
        <input type="range" min="0" max="19" value="10" class="age-slider" id="age-range">
    </section>

    <section id="quiz" class="bg-light">
        <h1>LE QUIZ DE MARIE</h1>
        <div class="quiz-container" id="quiz-box">
            <div id="quiz-content">
                <div class="quiz-question" id="q-text">Chargement de la question...</div>
                <div class="quiz-options" id="q-options"></div>
            </div>
            <div id="quiz-result">Score: <span id="score-val">0</span>/3</div>
            <button id="next-btn" class="submit-btn" style="display:none;" onclick="nextQuestion()">Question suivante ➡️</button>
        </div>
    </section>

    <section id="dossiers">
        <h1>LE MUR DU LEAK</h1>
        <div style="max-width:400px; margin:0 auto; background:white; padding:15px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
            <div style="width:100%; height:300px; border-radius:15px; overflow:hidden; position:relative;">
                <img id="dossier-img" src="https://via.placeholder.com/600?text=Prêt+?" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <button class="submit-btn" style="background:#ff4757" onclick="randomDossier()">🎲 DOSSIER AU HASARD</button>
        </div>
    </section>

    <section id="photobooth" style="background:#007bff; color:white;">
    <h1 style="color:white;">PHOTOBOOTH LIVE 📸</h1>
    <p style="color:white; font-family:'Playfair Display', serif; font-style:italic; margin-bottom:20px; font-size:1.1rem;">
        Une seule consigne : prendre une photo avec Marie la star
    </p>
    
    <div style="background:white; color:black; padding:30px; border-radius:20px; max-width:400px; margin:0 auto;">
        <input type="file" id="camera-input" accept="image/*" capture="camera" style="display:none" onchange="handleUpload(this.files[0])">
        <button id="upload-btn" onclick="document.getElementById('camera-input').click()" class="submit-btn" style="background:#ff4757">PRENDRE UNE PHOTO</button>
        <p id="upload-status"></p>
    </div>
</section>

    <section id="guestbook">
        <h1>LIVRE D'OR</h1>
        <div class="quiz-container">
            <input type="text" id="guest-name" placeholder="Ton nom..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <textarea id="guest-message" placeholder="Ton message..." style="width:100%; height:100px; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
            <button class="submit-btn" onclick="addMessage()">Envoyer ✨</button>
        </div>
        <div id="messages-container" style="margin-top:30px;"></div>
    </section>

    <script>
        function toggleMenu() { document.getElementById('navOverlay').classList.toggle('active'); }

        // --- QUIZ DATA ---
        const quizData = [
            { q: "Quelle est la couleur préférée de Marie ?", o: ["Bleu", "Rouge", "Vert"], a: 0 },
            { q: "Quelle est sa plus grande peur ?", o: ["La Vaisselle", "Dormir dans le noir", "Araignées"], a: 2 },
            { q: "Quel est son plat préféré ?", o: ["Pâtes carbonara", "Sushi", "Pizza 4 fromages"], a: 0 },
            { q: "Quelle chanson connaît-elle par cœur ?", o: ["Je te promets - Johnny Hallyday", "Dernière danse - Indila", "Conmigo - Kendji Girac"], a: 2 },
            { q: "Quel dessin animé pouvait-elle regarder en boucle quand elle était petite ?", o: ["Pokémon", "Totally Spies", "My little poney"], a: 1 },
            { q: "À quelle heure précise Marie est-elle née ?", o: ["9h15", "15h23", "2h30"], a: 2 },
            { q: "Quel est son deuxième prénom ?", o: ["Claire", "Aude", "Simone"], a: 1 },
            { q: "Quel est la marque de sa voiture ?", o: ["Toyota", "Renault", "Citroën"], a: 0 },
            { q: "Quel est le voyage de ses rêves ?", o: ["Italie", "Bagnols-sur-Cèze", "Dubaï"], a: 0 },
            { q: "Quelle taille fait-elle ?", o: ["170cm", "173cm", "168cm"], a: 1 }
            
        ]; 
        let currentQ = 0; let score = 0;

        function loadQuiz() {
            const q = quizData[currentQ];
            document.getElementById('q-text').innerText = q.q;
            const optContainer = document.getElementById('q-options');
            optContainer.innerHTML = "";
            q.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerText = opt;
                div.onclick = () => checkAnswer(i, div);
                optContainer.appendChild(div);
            });
        }

        function checkAnswer(idx, el) {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(o => o.style.pointerEvents = 'none');
            if(idx === quizData[currentQ].a) {
                el.classList.add('correct'); score++;
            } else {
                el.classList.add('wrong');
                options[quizData[currentQ].a].classList.add('correct');
            }
            document.getElementById('next-btn').style.display = "block";
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < quizData.length) {
                document.getElementById('next-btn').style.display = "none";
                loadQuiz();
            // ... (début de la fonction)
            } else {
            document.getElementById('quiz-content').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('quiz-result').style.display = "block";
    
            // ICI : On remplace le 3 par la longueur de ton tableau de questions
            document.getElementById('quiz-result').innerHTML = `Score final : <span id="score-val">${score}</span> / ${quizData.length}`;
            }
        }

        // --- LA VIE DE MARIE ---
        const photosParAge = {
            0: "roro..jpg",
            1: "roro..jpg",
            2: "roro..jpg",
            3: "roro..jpg",
            4: "roro..jpg",
            5: "roro..jpg",
            6: "roro..jpg",
            7: "roro..jpg",
            8: "roro..jpg",
            9: "roro..jpg",
            10: "https://via.placeholder.com/600x800?text=Marie+10+ans",
            11: "roro..jpg",
            12: "roro..jpg",
            13: "roro..jpg",
            14: "roro..jpg",
            15: "roro..jpg",
            16: "roro..jpg",
            17: "roro..jpg",
            18: "roro..jpg",
            19: "https://via.placeholder.com/600x800?text=Marie+20+ans"
        };
        document.getElementById('age-range').addEventListener('input', (e) => {
            const age = e.target.value;
            document.getElementById('current-age').innerText = age;
            let p = ""; const ages = Object.keys(photosParAge).map(Number).sort((a,b)=>b-a);
            for(let a of ages) if(age >= a) { p = photosParAge[a]; break; }
            document.getElementById('marie-photo').src = p;
        });

        // --- DOSSIERS ---
        function randomDossier() {
            const img = document.getElementById('dossier-img');
            img.src = "https://via.placeholder.com/600?text=DOSSIER+HASARD+" + Math.floor(Math.random()*100);
        }

        // --- LIVRE D'OR ---
        const gasUrl = "https://script.google.com/macros/s/AKfycbzVTic5rW9ZRocvFM6Q3J4i-LRTjTZ-UjPRyMz86HkZWmnToSveNWluvOh_jSBahIJE/exec";
        async function loadMessages() {
            const r = await fetch(gasUrl); const data = await r.json();
            const c = document.getElementById('messages-container'); c.innerHTML = "";
            data.forEach(m => {
                c.innerHTML += `<div class="message-card"><h4>${m.nom}</h4><p>"${m.message}"</p></div>`;
            });
        }
        async function addMessage() {
            const n = document.getElementById('guest-name'); const m = document.getElementById('guest-message');
            if(!n.value || !m.value) return;
            fetch(gasUrl, {method:'POST', mode:'no-cors', body:JSON.stringify({nom:n.value, message:m.value})});
            n.value = ""; m.value = ""; setTimeout(loadMessages, 1000);
        }

        // --- INIT ---
        loadQuiz(); loadMessages();
    </script>
</body>
</html>
