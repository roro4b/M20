<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life of Marie - 20 Ans</title>
    <style>
        /* --- STYLE GLOBAL --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600;1,700&display=swap');

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #007bff;
            color: #ffffff;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box;
            z-index: 1000; background: rgba(0, 123, 255, 0.98);
            backdrop-filter: blur(10px);
        }
        .logo { font-weight: 900; letter-spacing: 1px; }
        .menu-btn {
            background-color: #ffffff; color: #007bff;
            padding: 8px 15px; border-radius: 5px;
            font-weight: 900; font-size: 0.75rem;
            border: none; text-transform: uppercase;
        }

        /* --- SECTION HERO --- */
        .section-hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; position: relative;
        }
        .grid-text-container { text-transform: uppercase; line-height: 0.85; z-index: 10; }
        .row-life { font-size: 22vw; }
        .row-of { font-size: 16vw; margin-left: 5%; }
        .row-marie { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: 18vw; text-transform: lowercase; margin-top: -2%; }
        .sunglasses { font-size: 18vw; position: absolute; top: 15%; left: 10%; animation: float 4s infinite ease-in-out; }
        .moving-sun { font-size: 15vw; position: absolute; bottom: 15%; right: 10%; animation: float 5s infinite ease-in-out; }

        /* --- 1. TIMELINE --- */
        .section-timeline { background-color: #f8f9fa; color: #000; padding: 80px 20px; }
        .section-timeline h1 { font-size: 2.5rem; text-align: center; margin-bottom: 50px; color: #007bff; }
        .timeline-wrapper { position: relative; max-width: 100%; }
        .timeline-wrapper::after { content: ''; position: absolute; width: 4px; background-color: #007bff; top: 0; bottom: 0; left: 15px; }
        .event-container { position: relative; margin-bottom: 50px; padding-left: 45px; }
        .event-container::after { content: ''; position: absolute; width: 18px; height: 18px; background-color: #007bff; left: 8px; top: 5px; border-radius: 50%; z-index: 2; }
        .event-content h3 { margin: 0; font-size: 1.5rem; color: #007bff; }
        .event-content p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin: 5px 0; }

        /* --- 2. MARIE-O-SCOPE --- */
        .section-evolution { background: #ffffff; padding: 80px 20px; text-align: center; color: #000; border-top: 1px solid #eee; }
        .section-evolution h1 { color: #007bff; font-size: 2.5rem; margin-bottom: 10px; }
        .age-display { font-size: 3.5rem; font-weight: 900; color: #007bff; margin-bottom: 20px; }
        .morph-container {
            width: 280px; height: 350px; margin: 0 auto;
            border: 6px solid #007bff; border-radius: 20px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .morph-container img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        .slider-wrapper { max-width: 300px; margin: 30px auto; }
        .age-slider { width: 100%; cursor: pointer; accent-color: #007bff; }
        .slider-labels { display: flex; justify-content: space-between; color: #007bff; font-weight: bold; margin-top: 10px; }

        /* --- 3. WALL OF SHAME --- */
        .section-dossiers { background-color: #f8f9fa; padding: 80px 20px; text-align: center; color: #000; border-top: 1px solid #eee; }
        .section-dossiers h1 { color: #ff4757; font-size: 2.5rem; margin-bottom: 10px; }
        .dossier-card { max-width: 400px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dossier-display { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; position: relative; background: #eee; margin-bottom: 20px; }
        .dossier-display img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
        .dossier-caption { position: absolute; bottom: 0; width: 100%; background: rgba(255, 71, 87, 0.9); color: white; padding: 10px; font-family: 'Playfair Display', serif; font-style: italic; }
        .dossier-btn { background: #ff4757; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1rem; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); }

        /* --- 4. PHOTOBOOTH SECTION --- */
        .section-photobooth { padding: 80px 20px; text-align: center; background: #007bff; color: white; border-top: 1px solid rgba(255,255,255,0.2); }
        .photo-card { background: white; color: #000; padding: 40px 20px; border-radius: 30px; max-width: 400px; margin: 0 auto; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }

        /* --- 5. LIVRE D'OR --- */
        .section-guestbook { background-color: #ffffff; padding: 80px 20px; color: #000; border-top: 1px solid #eee; }
        .section-guestbook h1 { font-size: 2.5rem; text-align: center; color: #007bff; margin-bottom: 40px; }
        .guestbook-form { background: #f4f7f6; padding: 25px 20px; border-radius: 20px; margin-bottom: 40px; }
        .guestbook-form input, .guestbook-form textarea {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border-radius: 10px; border: 2px solid #007bff;
            font-size: 16px; font-family: 'Poppins', sans-serif; box-sizing: border-box;
        }
        .guestbook-form textarea { height: 100px; resize: none; }
        .submit-btn { background: #007bff; color: #fff; padding: 15px; border-radius: 40px; border: none; width: 100%; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; }
        .submit-btn:disabled { background: #ccc; }
        .message-card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .message-card h4 { color: #007bff; margin: 0 0 5px 0; }
        .message-card p { font-family: 'Playfair Display', serif; font-style: italic; margin: 0; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">MARIE 20</div>
        <button class="menu-btn" onclick="document.getElementById('guestbook').scrollIntoView()">Livre d'or ✍️</button>
    </header>

    <section class="section-hero">
        <div class="sunglasses">🕶️</div>
        <div class="moving-sun">☀️</div>
        <div class="grid-text-container">
            <div class="row-life">LIFE</div>
            <div class="row-of">OF</div>
            <div class="row-marie">marie</div>
        </div>
    </section>

    <section id="timeline" class="section-timeline">
        <h1>SA STORY</h1>
        <div class="timeline-wrapper">
            <div class="event-container">
                <div class="event-content">
                    <h3>2004</h3>
                    <p>Le début de l'aventure.</p>
                </div>
            </div>
            <div class="event-container">
                <div class="event-content">
                    <h3>2024</h3>
                    <p>L'âge de tous les possibles.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="section-evolution">
        <h1>MARIE-O-SCOPE</h1>
        <div class="age-display"><span id="current-age">10</span> ANS</div>
        <div class="morph-container">
            <img id="marie-photo" src="https://via.placeholder.com/600x800?text=Photo+10+ans" alt="Marie">
        </div>
        <div class="slider-wrapper">
            <input type="range" min="0" max="20" value="10" class="age-slider" id="age-range">
            <div class="slider-labels">
                <span>0</span><span>5</span><span>10</span><span>15</span><span>20</span>
            </div>
        </div>
    </section>

    <section id="dossiers" class="section-dossiers">
        <h1>WALL OF SHAME</h1>
        <p>Attention, ça pique les yeux...</p>
        <div class="dossier-card">
            <div id="dossier-display" class="dossier-display">
                <img id="dossier-img" src="https://via.placeholder.com/600?text=Appuie+sur+le+bouton" alt="Dossier">
                <div id="dossier-caption" class="dossier-caption">Prêt pour le choc ?</div>
            </div>
            <button class="dossier-btn" onclick="randomDossier()">VOIR UN DOSSIER AU HASARD 🎲</button>
        </div>
    </section>

    <section id="photobooth" class="section-photobooth">
        <h1>PHOTOBOOTH LIVE 📸</h1>
        <p>Prends une photo, elle arrive direct chez Marie !</p>
        <div class="photo-card">
            <input type="file" id="camera-input" accept="image/*" capture="camera" style="display:none" onchange="handleUpload(this.files[0])">
            <button id="upload-btn" onclick="document.getElementById('camera-input').click()" class="submit-btn" style="background:#ff4757">
                OUVRIR L'APPAREIL PHOTO
            </button>
            <p id="upload-status" style="margin-top:15px; font-size:0.8rem; color:#666;"></p>
        </div>
    </section>

    <section id="guestbook" class="section-guestbook">
        <h1>LIVRE D'OR</h1>
        <div class="guestbook-form">
            <input type="text" id="guest-name" placeholder="Ton nom...">
            <textarea id="guest-message" placeholder="Ton message..."></textarea>
            <button class="submit-btn" onclick="addMessage()">Envoyer ✨</button>
        </div>
        <div id="messages-container"></div>
    </section>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzVTic5rW9ZRocvFM6Q3J4i-LRTjTZ-UjPRyMz86HkZWmnToSveNWluvOh_jSBahIJE/exec";

        // --- PHOTOBOOTH LOGIC ---
        async function handleUpload(file) {
            if(!file) return;
            const API_KEY = "2265ca8675d033347909edc775488abc";
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');
            btn.disabled = true; btn.innerText = "ENVOI EN COURS...";
            const formData = new FormData(); formData.append("image", file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: formData });
                const result = await response.json();
                if (result.success) {
                    btn.innerText = "PHOTO ENVOYÉE ! ✅"; btn.style.background = "#2ed573";
                    status.innerText = "Marie l'a reçue !";
                    setTimeout(() => {
                        btn.disabled = false; btn.innerText = "OUVRIR L'APPAREIL PHOTO";
                        btn.style.background = "#ff4757"; status.innerText = "";
                    }, 3000);
                }
            } catch (error) { alert("Erreur d'envoi"); btn.disabled = false; }
        }

        // --- MARIE-O-SCOPE ---
        const ageRange = document.getElementById('age-range');
        const ageDisplay = document.getElementById('current-age');
        const mariePhoto = document.getElementById('marie-photo');

        const photosParAge = {
            0: "https://via.placeholder.com/600x800?text=Bébé+0+an",
            5: "https://via.placeholder.com/600x800?text=Enfant+5+ans",
            10: "https://via.placeholder.com/600x800?text=Marie+10+ans",
            20: "https://via.placeholder.com/600x800?text=Marie+20+ans"
        };

        ageRange.addEventListener('input', () => {
            const age = ageRange.value;
            ageDisplay.innerText = age;
            let photoAffichee = "";
            const agesDispos = Object.keys(photosParAge).map(Number).sort((a,b) => b-a);
            for (let a of agesDispos) { if (age >= a) { photoAffichee = photosParAge[a]; break; } }
            if(photoAffichee) mariePhoto.src = photoAffichee;
        });

        // --- WALL OF SHAME ---
        const dossiers = [
            { url: "https://via.placeholder.com/600?text=DOSSIER+1", text: "La sieste mythique..." },
            { url: "https://via.placeholder.com/600?text=DOSSIER+2", text: "Ce look était... audacieux." },
            { url: "https://via.placeholder.com/600?text=DOSSIER+3", text: "Une grimace de compet'." }
        ];

        function randomDossier() {
            const img = document.getElementById('dossier-img');
            const cap = document.getElementById('dossier-caption');
            img.style.opacity = 0;
            setTimeout(() => {
                const d = dossiers[Math.floor(Math.random() * dossiers.length)];
                img.src = d.url;
                cap.innerText = d.text;
                img.style.opacity = 1;
            }, 200);
        }

        // --- LIVRE D'OR ---
        async function loadMessages() {
            try {
                const response = await fetch(url);
                const messages = await response.json();
                const container = document.getElementById('messages-container');
                container.innerHTML = ""; 
                messages.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.innerHTML = `<h4>${msg.nom}</h4><p>"${msg.message}"</p>`;
                    container.appendChild(card);
                });
            } catch (e) { console.log("Erreur chargement"); }
        }

        async function addMessage() {
            const name = document.getElementById('guest-name');
            const msg = document.getElementById('guest-message');
            const btn = document.querySelector('.submit-btn');
            if (!name.value || !msg.value) return alert("Remplis tout !");
            btn.innerText = "Envoi... 🚀"; btn.disabled = true;
            fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nom: name.value, message: msg.value }) });
            setTimeout(() => {
                name.value = ""; msg.value = "";
                btn.innerText = "Envoyer ✨"; btn.disabled = false;
                loadMessages();
            }, 1500);
        }

        loadMessages();
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
